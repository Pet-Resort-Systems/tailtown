name: Test Gate

# CI/CD Test Gate
# Runs tests on every push and PR to prevent broken code from being deployed
# Created: Nov 28, 2025

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20.19.0"

jobs:
  # Run unit tests for customer-service
  test-customer-service:
    name: Customer Service Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tailtown_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/customer/package-lock.json

      - name: Install dependencies
        working-directory: services/customer
        run: npm ci

      - name: Generate Prisma Client
        working-directory: services/customer
        run: npx prisma generate

      - name: Run tests
        working-directory: services/customer
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tailtown_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test -- --passWithNoTests --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: services/customer/coverage/lcov.info
          flags: customer-service
          fail_ci_if_error: false

  # Run unit tests for reservation-service
  test-reservation-service:
    name: Reservation Service Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tailtown_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/reservation-service/package-lock.json

      - name: Install dependencies
        working-directory: services/reservation-service
        run: npm ci

      - name: Generate Prisma Client
        working-directory: services/reservation-service
        run: npx prisma generate

      - name: Run tests
        working-directory: services/reservation-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tailtown_test
          NODE_ENV: test
        run: npm test -- --passWithNoTests --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: services/reservation-service/coverage/lcov.info
          flags: reservation-service
          fail_ci_if_error: false

  # Run frontend tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --passWithNoTests --coverage --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # Build check - ensures code compiles
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test-customer-service, test-reservation-service, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Customer Service
        working-directory: services/customer
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Build Reservation Service
        working-directory: services/reservation-service
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # Critical path tests - run on main branch only
  critical-path-tests:
    name: Critical Path Tests
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Critical Path E2E Tests
        working-directory: frontend
        run: |
          # These tests require a running server
          # Skip for now, but log that they should be run
          echo "⚠️ E2E tests require running services"
          echo "Run locally with: npx playwright test calendar-dashboard-critical.spec.ts"
        continue-on-error: true

  # Deployment gate - only passes if all tests pass
  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs:
      [
        test-customer-service,
        test-reservation-service,
        test-frontend,
        build-check,
      ]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-customer-service.result }}" != "success" ]; then
            echo "❌ Customer Service tests failed"
            exit 1
          fi
          if [ "${{ needs.test-reservation-service.result }}" != "success" ]; then
            echo "❌ Reservation Service tests failed"
            exit 1
          fi
          if [ "${{ needs.test-frontend.result }}" != "success" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "❌ Build check failed"
            exit 1
          fi
          echo "✅ All tests passed - safe to deploy"
