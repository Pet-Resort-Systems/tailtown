name: Test Gate

# CI/CD Test Gate
# Runs tests on every push and PR to prevent broken code from being deployed
# Created: Nov 28, 2025

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24.14.0'

jobs:
  dependabot-shortcut:
    name: Dependabot Shortcut
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}

    steps:
      - run: echo "Skipping heavy checks for Dependabot PR."

  # Run unit tests for customer-service
  test-customer-service:
    name: Customer Service Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tailtown_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: apps/customer-service
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/customer-service
        run: pnpm exec prisma generate

      - name: Run tests
        working-directory: apps/customer-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tailtown_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: pnpm test -- --passWithNoTests --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: apps/customer-service/coverage/lcov.info
          flags: customer-service
          fail_ci_if_error: false

  # Run unit tests for reservation-service
  test-reservation-service:
    name: Reservation Service Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tailtown_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: apps/reservation-service
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/reservation-service
        run: pnpm exec prisma generate

      - name: Run tests
        working-directory: apps/reservation-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tailtown_test
          NODE_ENV: test
        run: pnpm test -- --passWithNoTests --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: apps/reservation-service/coverage/lcov.info
          flags: reservation-service
          fail_ci_if_error: false

  # Run apps/frontend tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: apps/frontend
        env:
          CI: true
        run: pnpm test -- --passWithNoTests --coverage --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: apps/frontend/coverage/lcov.info
          flags: apps/frontend
          fail_ci_if_error: false

  # Build check - ensures code compiles
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}
    needs: [test-customer-service, test-reservation-service, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Customer Service
        working-directory: apps/customer-service
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm run build

      - name: Build Reservation Service
        working-directory: apps/reservation-service
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm run build

      - name: Build Frontend
        working-directory: apps/frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

  # Critical path tests - run on main branch only
  critical-path-tests:
    name: Critical Path Tests
    runs-on: ubuntu-latest
    needs: build-check
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: |
          pnpm install --frozen-lockfile
          pnpm run test:e2e --install-deps

      - name: Run Critical Path E2E Tests
        run: |
          # Run E2E tests using the new workspace command
           # These tests require a running server
          # Skip for now, but log that they should be run
          echo "⚠️ E2E tests require running services"
          echo "Run locally with: pnpm run test:e2e"
        continue-on-error: true

  # Deployment gate - only passes if all tests pass
  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs:
      [
        dependabot-shortcut,
        test-customer-service,
        test-reservation-service,
        test-frontend,
        build-check,
      ]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.dependabot-shortcut.result }}" == "success" ]; then
            echo "✅ Heavy checks were skipped for Dependabot"
            exit 0
          fi
          if [ "${{ needs.test-customer-service.result }}" != "success" ]; then
            echo "❌ Customer Service tests failed"
            exit 1
          fi
          if [ "${{ needs.test-reservation-service.result }}" != "success" ]; then
            echo "❌ Reservation Service tests failed"
            exit 1
          fi
          if [ "${{ needs.test-frontend.result }}" != "success" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "❌ Build check failed"
            exit 1
          fi
          echo "✅ All tests passed - safe to deploy"
