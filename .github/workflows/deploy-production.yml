name: Deploy to Production

on:
  push:
    branches:
      - main # Change to your production branch
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies - Customer Service
        working-directory: ./apps/customer-service
        run: pnpm install --frozen-lockfile

      - name: Run tests - Customer Service
        working-directory: ./apps/customer-service
        run: pnpm test

      - name: Install dependencies - Frontend
        working-directory: ./apps/frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests - Frontend
        working-directory: ./apps/frontend
        run: pnpm test -- --watchAll=false

  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Build Customer Service
        working-directory: ./apps/customer-service
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build Reservation Service
        working-directory: ./apps/reservation-service
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build Frontend
        working-directory: ./apps/frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/frontend/build
            apps/customer-service/dist
            apps/reservation-service/dist

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/tailtown
            git pull origin main
            ./scripts/deploy.sh

      - name: Notify deployment success
        if: success()
        run: echo "Deployment successful!"

      - name: Notify deployment failure
        if: failure()
        run: echo "Deployment failed!"
