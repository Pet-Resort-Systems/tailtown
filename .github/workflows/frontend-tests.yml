name: Frontend Tests

on:
  push:
    branches: [main, sept25-stable, develop]
    paths:
      - "apps/frontend/**"
      - ".github/workflows/apps/frontend-tests.yml"
  pull_request:
    branches: [main, sept25-stable, develop]
    paths:
      - "apps/frontend/**"
      - ".github/workflows/apps/frontend-tests.yml"

jobs:
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.19.0]

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run timezone handling tests
        run: pnpm test -- timezone-handling --passWithNoTests --watchAll=false
        continue-on-error: true

      - name: Run dashboard-calendar sync tests
        run: pnpm test -- dashboard-calendar-sync --passWithNoTests --watchAll=false
        continue-on-error: true

      - name: Run all tests with coverage
        run: pnpm test -- --coverage --watchAll=false --passWithNoTests
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: success()
        with:
          files: ./apps/frontend/coverage/lcov.info
          flags: apps/frontend
          name: apps/frontend-coverage
          fail_ci_if_error: false

      - name: Comment test results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const testResults = 'Tests completed! ✅';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results\n\n${testResults}\n\nFrontend tests have completed. Check the Actions tab for detailed results.`
            });
