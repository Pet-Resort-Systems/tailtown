name: No package-lock guard

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on npm lockfiles
        run: |
          if git ls-files | grep -E 'package-lock\.json$'; then
            echo "❌ package-lock.json files are not allowed in pnpm workspace"
            exit 1
          fi
          echo "✅ No package-lock.json files found"
