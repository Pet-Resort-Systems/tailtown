name: Deploy to Staging

on:
  push:
    branches:
      - staging
      - develop
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '24.14.0'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tailtown_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Customer Service
        working-directory: ./apps/customer-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tailtown_test
          REDIS_URL: redis://localhost:6379
        run: pnpm test

      - name: Test Reservation Service
        working-directory: ./apps/reservation-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tailtown_test
          REDIS_URL: redis://localhost:6379
        run: pnpm test

      - name: Test Frontend
        working-directory: ./apps/frontend
        run: pnpm test -- --watchAll=false --passWithNoTests

  build:
    name: Build for Staging
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Customer Service
        working-directory: ./apps/customer-service
        run: pnpm run build

      - name: Build Reservation Service
        working-directory: ./apps/reservation-service
        run: pnpm run build

      - name: Build Frontend (Staging)
        working-directory: ./apps/frontend
        env:
          REACT_APP_API_URL: ${{ secrets.STAGING_API_URL }}
          REACT_APP_ENVIRONMENT: staging
          REACT_APP_SENTRY_ENABLED: 'true'
          REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: staging-build
          path: |
            apps/frontend/build
            apps/customer-service/dist
            apps/reservation-service/dist
          retention-days: 7

  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: staging-build

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/tailtown-staging

            # Pull latest code
            git fetch origin
            git checkout staging
            git pull origin staging

            # Install dependencies
            pnpm install --frozen-lockfile --prod

            # Run database migrations
            cd apps/customer-service && pnpm exec prisma migrate deploy && cd ../..

            # Reload services
            pm2 reload ecosystem.staging.config.js

            # Health check
            sleep 5
            curl -f http://localhost:5004/health || exit 1

            echo "Staging deployment complete!"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Staging deployment successful!"
          echo "URL: https://staging.tailtown.canicloud.com"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Staging deployment failed!"
          exit 1

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Health check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.tailtown.canicloud.com/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status: $response"
            exit 1
          fi
          echo "Health check passed!"

      - name: API smoke test
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.tailtown.canicloud.com/api/health)
          if [ "$response" != "200" ]; then
            echo "API health check failed with status: $response"
            exit 1
          fi
          echo "API smoke test passed!"
