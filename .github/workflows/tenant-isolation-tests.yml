name: Tenant Isolation Tests

on:
  push:
    branches: [main, sept25-stable, develop]
  pull_request:
    branches: [main, sept25-stable, develop]
  workflow_dispatch:

jobs:
  dependabot-shortcut:
    name: Dependabot Shortcut
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}

    steps:
      - run: echo "Skipping heavy checks for Dependabot PR."

  tenant-isolation-tests:
    name: Comprehensive Tenant Isolation Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: customer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/customer-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customer_test
        run: |
          echo "Setting up test database..."
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy
          echo "Test database ready"

      - name: Run tenant isolation tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customer_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
        run: |
          echo "Running comprehensive tenant isolation tests..."
          pnpm test -- tenant-isolation-comprehensive --watchAll=false --verbose --forceExit

      - name: Run middleware tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customer_test
          NODE_ENV: test
        run: |
          echo "Running tenant middleware tests..."
          pnpm test -- tenant.middleware.test --watchAll=false --verbose
        continue-on-error: true

      - name: Generate test coverage report
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customer_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
        run: |
          echo "Generating coverage report for tenant isolation..."
          pnpm test -- tenant-isolation --coverage --watchAll=false --collectCoverageFrom='src/middleware/tenant.middleware.ts' --collectCoverageFrom='src/controllers/**/*.ts'
        continue-on-error: true

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tenant-isolation-coverage
          path: apps/customer-service/coverage/
          retention-days: 30
        continue-on-error: true

      - name: Test Summary
        if: always()
        run: |
          echo "## Tenant Isolation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Coverage:" >> $GITHUB_STEP_SUMMARY
          echo "- Middleware UUID conversion" >> $GITHUB_STEP_SUMMARY
          echo "- Controller tenant filtering" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-tenant data leakage prevention" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant context validation" >> $GITHUB_STEP_SUMMARY
          echo "- Database query isolation" >> $GITHUB_STEP_SUMMARY
