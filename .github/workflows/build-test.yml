name: Build Tests

on:
  push:
    branches: [main, develop, 'fix/**', 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  test-builds:
    name: Test Service Builds
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['24.14.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Customer Service
        run: |
          cd apps/customer-service
          pnpm run build

      - name: Build Reservation Service
        run: |
          cd apps/reservation-service
          pnpm run build

      - name: Check for TypeScript Errors
        run: |
          echo "Checking Customer Service..."
          cd apps/customer-service
          pnpm exec tsc --noEmit || echo "Customer service has TypeScript warnings"
          cd ../..

          echo "Checking Reservation Service..."
          cd apps/reservation-service
          pnpm exec tsc --noEmit || echo "Reservation service has TypeScript warnings"
          cd ../..

  test-docker-builds:
    name: Test Docker Builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Test Customer Service Docker Build
        run: |
          docker build -f apps/customer-service/Dockerfile.prod -t test-customer .

      - name: Test Reservation Service Docker Build
        run: |
          docker build -f apps/reservation-service/Dockerfile.prod -t test-reservation .

      - name: Test Frontend Docker Build
        run: |
          docker build -f apps/frontend/Dockerfile.prod -t test-frontend .
