name: Test Suite

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]
    paths-ignore:
      - "apps/legacy-frontend/**"
      - "apps/legacy-admin-portal/**"

jobs:
  dependabot-shortcut:
    name: Dependabot Shortcut
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}

    steps:
      - run: echo "Skipping heavy checks for Dependabot PR."

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}

    strategy:
      matrix:
        node-version: ['24.14.0']

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: customer
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: |
          cd apps/customer-service && pnpm run lint || true
          cd ../reservation-service && pnpm run lint || true

      - name: Setup database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/customer
        run: |
          cd apps/customer-service
          pnpm exec prisma migrate deploy
          pnpm exec prisma generate
          cd ../reservation-service
          pnpm exec prisma migrate deploy
          pnpm exec prisma generate

      - name: Build canonical frontend (Vite)
        run: pnpm --dir apps/frontend build

      - name: Run customer service tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/customer
          NODE_ENV: test
        run: |
          cd apps/customer-service
          pnpm test

      - name: Run reservation service tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/customer
          NODE_ENV: test
        run: |
          cd apps/reservation-service
          pnpm test

      - name: Generate coverage report
        if: matrix.node-version == '24.14.0'
        run: pnpm run test:coverage || true

      - name: Upload coverage to Codecov
        if: matrix.node-version == '24.14.0'
        uses: codecov/codecov-action@v6
        with:
          files: ./apps/customer-service/coverage/lcov.info,./apps/reservation-service/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
