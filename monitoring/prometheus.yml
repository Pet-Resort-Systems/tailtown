# Prometheus Configuration for Tailtown
#
# Scrapes metrics from customer-service and reservation-service
# Includes alerting rules for critical thresholds

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load alerting rules
rule_files:
  - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Customer Service
  - job_name: "customer-service"
    static_configs:
      - targets: ["localhost:4004"]
    metrics_path: "/monitoring/prometheus"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Reservation Service
  - job_name: "reservation-service"
    static_configs:
      - targets: ["localhost:4003"]
    metrics_path: "/monitoring/prometheus"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Node Exporter (system metrics - optional)
  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]

  # PostgreSQL Exporter (database metrics - optional)
  - job_name: "postgres"
    static_configs:
      - targets: ["localhost:9187"]

  # Redis Exporter (cache metrics - optional)
  - job_name: "redis"
    static_configs:
      - targets: ["localhost:9121"]
