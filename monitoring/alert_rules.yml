# Prometheus Alerting Rules for Tailtown
#
# Critical alerts for production monitoring

groups:
  - name: tailtown_alerts
    rules:
      # High Error Rate
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_request_errors_total[5m])) 
            / 
            sum(rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: CriticalErrorRate
        expr: |
          (
            sum(rate(http_request_errors_total[5m])) 
            / 
            sum(rate(http_requests_total[5m]))
          ) > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      # Slow Response Times
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95, 
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response times detected"
          description: "P95 response time is {{ $value | humanizeDuration }} (threshold: 1s)"

      # High Rate Limit Hits
      - alert: HighRateLimitHits
        expr: |
          (
            sum(rate(rate_limit_hits_total[5m])) 
            / 
            sum(rate(http_requests_total[5m]))
          ) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit hits"
          description: "{{ $value | humanizePercentage }} of requests are rate limited"

      # Service Down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: |
          (
            process_memory_bytes{type="heapUsed"} 
            / 
            process_memory_bytes{type="heapTotal"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Heap usage is {{ $value | humanizePercentage }}"

      # Database Errors
      - alert: DatabaseErrors
        expr: rate(db_query_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database errors detected"
          description: "Database error rate: {{ $value }} errors/sec"

      # No Active Tenants (potential issue)
      - alert: NoActiveTenants
        expr: active_tenants_total == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No active tenants"
          description: "No active tenants detected - possible database issue"
