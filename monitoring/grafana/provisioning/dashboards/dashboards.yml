# Grafana Dashboard Provisioning
# Auto-loads dashboards from the dashboards directory

apiVersion: 1

providers:
  - name: "Tailtown Dashboards"
    orgId: 1
    folder: "Tailtown"
    folderUid: "tailtown"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
