# Tailtown Staging Nginx Configuration
# Place this file in /etc/nginx/sites-available/tailtown-staging
# Then: sudo ln -s /etc/nginx/sites-available/tailtown-staging /etc/nginx/sites-enabled/

# ============================================
# RATE LIMITING ZONES (shared with production or separate)
# ============================================

limit_req_zone $binary_remote_addr zone=staging_api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=staging_login_limit:10m rate=5r/m;

# Upstream backend services (staging ports)
upstream staging_customer_service {
    least_conn;
    server localhost:5004 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream staging_reservation_service {
    least_conn;
    server localhost:5003 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name staging.tailtown.canicloud.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server - Staging
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.tailtown.canicloud.com;
    
    # SSL Configuration (use wildcard or separate cert)
    ssl_certificate /etc/letsencrypt/live/staging.tailtown.canicloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.tailtown.canicloud.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Robots-Tag "noindex, nofollow" always;  # Prevent search indexing
    add_header X-Environment "staging" always;  # Identify as staging
    
    # Frontend static files
    root /var/www/tailtown-staging/frontend;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    
    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1d;  # Shorter cache for staging
            add_header Cache-Control "public";
        }
    }
    
    # API routes - Customer Service
    location /api {
        limit_req zone=staging_api_limit burst=20 nodelay;
        
        proxy_pass http://staging_customer_service;
        proxy_http_version 1.1;
        
        proxy_set_header X-Environment "staging";
        proxy_set_header X-API-Version "v1";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header X-Environment "staging" always;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://staging_customer_service;
    }
    
    # File uploads
    location /api/upload {
        client_max_body_size 10M;
        proxy_pass http://staging_customer_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Access and error logs
    access_log /var/log/nginx/tailtown-staging-access.log;
    error_log /var/log/nginx/tailtown-staging-error.log;
}
